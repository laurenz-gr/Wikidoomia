<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Wikidoomia</title>
<meta name="description" content="Ein endloser, lernender Wikipedia-Feed.">
<meta name="theme-color" content="#f4f4f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15171d" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wikidoomia">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f4f2;
    --ink:#1a1a1a;
    --muted:#5a5a5a;
    --paper:#ffffff;
    --border:#1a1a1a;
    --shadow:#1a1a1a;
    --accent:#ff6b35;
    --accent-ink:#1a1a1a;
    --accent2:#1557ff;
    --danger:#be1e2d;
    --gold:#f4a700;
    --accent-text:#c2410c;   /* accessible orange for text on light surfaces (≥4.5:1) */
    --gold-text:#8a6500;     /* accessible gold for text on light surfaces */
    --on-accent2:#ffffff;    /* text on filled accent2 backgrounds */
    --focus:#0f62ff;

    /* Liquid Glass */
    --glass-bg:rgba(255,255,255,.55);
    --glass-bg-strong:rgba(255,255,255,.72);
    --glass-brd:rgba(255,255,255,.65);
    --glass-hi:rgba(255,255,255,.9);
    --glass-shadow:rgba(20,30,60,.18);
    --dot:rgba(20,30,60,.10);
  }
  .dark{
    --bg:#15171d;
    --ink:#f4f4f2;
    --muted:#aab0bb;
    --paper:#262932;
    --border:#f4f4f2;
    --shadow:#000;
    --accent:#ff7a47;
    --accent-ink:#1a1a1a;
    --accent2:#5b8cff;
    --danger:#d63848;
    --gold:#ffc23d;
    --accent-text:#ff7a47;   /* orange on dark surfaces already meets contrast */
    --gold-text:#ffc23d;
    --on-accent2:#0b1020;    /* dark text on lighter accent2 in dark mode (≥4.5:1) */
    --focus:#9dc0ff;

    --glass-bg:rgba(40,44,55,.50);
    --glass-bg-strong:rgba(42,46,58,.78);
    --glass-brd:rgba(255,255,255,.14);
    --glass-hi:rgba(255,255,255,.22);
    --glass-shadow:rgba(0,0,0,.5);
    --dot:rgba(255,255,255,.07);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:rgba(0,0,0,.06)}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    overflow-x:hidden;
    line-height:1.5;
  }
  /* subtle fixed dot texture so glass surfaces have something to refract (no orbs/blobs) */
  body::before{
    content:"";
    position:fixed; inset:0;
    z-index:-2;
    background-image:radial-gradient(var(--dot) 1px, transparent 1.5px);
    background-size:22px 22px;
    pointer-events:none;
  }

  h1,h2,h3,.bebas{
    font-family:'Bebas Neue','Impact',sans-serif;
    font-weight:400;
    text-transform:uppercase;
    letter-spacing:0;
    margin:0;
  }

  .glass{
    background:var(--glass-bg);
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border:1px solid var(--glass-brd);
    box-shadow:0 8px 30px var(--glass-shadow), inset 0 1px 0 var(--glass-hi);
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; gap:12px;
    padding:10px max(14px,env(safe-area-inset-left));
    border-radius:0 0 16px 16px;
    margin:0 0 8px;
    transition:transform .3s cubic-bezier(.2,.8,.2,1);
  }
  .topbar.hidden{transform:translateY(-120%)}
  .brand{display:flex; align-items:baseline; gap:8px; margin-right:auto; min-width:0; overflow:hidden}
  .brand .logo{
    font-size:1.9rem; line-height:.9;
    color:var(--ink);
    white-space:nowrap;
  }
  .brand .logo .ac{color:var(--accent-text)}
  .brand .sub{font-size:11px; font-weight:700; color:var(--muted); white-space:nowrap}

  .seg{
    display:inline-flex; border-radius:999px; overflow:hidden;
    border:1px solid var(--glass-brd); background:var(--glass-bg);
    backdrop-filter:blur(12px) saturate(150%); -webkit-backdrop-filter:blur(12px) saturate(150%);
  }
  .seg button{
    border:0; background:transparent; color:var(--ink);
    font:inherit; font-weight:800; cursor:pointer;
    padding:8px 13px; min-height:40px; font-size:13px;
  }
  .seg button.active{background:var(--accent2); color:var(--on-accent2)}

  .iconbtn{
    width:42px; height:42px; flex:0 0 auto;
    display:inline-flex; align-items:center; justify-content:center;
    border-radius:14px; cursor:pointer; color:var(--ink);
    border:1px solid var(--glass-brd); background:var(--glass-bg);
    backdrop-filter:blur(12px) saturate(150%); -webkit-backdrop-filter:blur(12px) saturate(150%);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    transition:transform .14s ease;
    position:relative;
  }
  .iconbtn[hidden]{display:none}
  .iconbtn:hover{transform:translateY(-1px)}
  .iconbtn:active{transform:translateY(1px)}
  .iconbtn .ic{width:20px;height:20px}
  .badge-count{
    position:absolute; top:-5px; right:-5px;
    min-width:18px; height:18px; padding:0 4px;
    border-radius:999px; background:var(--accent); color:var(--accent-ink);
    font-size:11px; font-weight:900; line-height:18px; text-align:center;
    border:2px solid var(--bg);
  }

  .ic{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .ic.fill{fill:currentColor;stroke:currentColor}

  /* ---------- Search bar ---------- */
  .searchbar{
    position:sticky; top:64px; z-index:35;
    max-width:680px; margin:0 auto 8px;
    display:flex; gap:8px; align-items:center;
    padding:8px; border-radius:16px;
  }
  .searchbar[hidden]{display:none}
  .searchbar:not([hidden]){
    background:var(--glass-bg); border:1px solid var(--glass-brd);
    backdrop-filter:blur(18px) saturate(160%); -webkit-backdrop-filter:blur(18px) saturate(160%);
    box-shadow:0 8px 30px var(--glass-shadow), inset 0 1px 0 var(--glass-hi);
  }
  .searchbar #searchInput{flex:1; min-width:0}

  .search-results{
    max-width:680px; margin:0 auto 10px; padding:8px;
    border-radius:16px; max-height:64vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:var(--glass-bg-strong); border:1px solid var(--glass-brd);
    backdrop-filter:blur(18px) saturate(160%); -webkit-backdrop-filter:blur(18px) saturate(160%);
    box-shadow:0 8px 30px var(--glass-shadow), inset 0 1px 0 var(--glass-hi);
  }
  .search-results[hidden]{display:none}
  .search-head{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:6px 8px}
  .search-recent{display:flex;flex-wrap:wrap;gap:8px;padding:2px 6px 6px}
  .sresult{display:flex;gap:11px;align-items:center;padding:9px;border-radius:12px;cursor:pointer}
  .sresult:hover,.sresult:focus-visible{background:color-mix(in srgb,var(--accent2) 14%,transparent);outline:none}
  .sresult img,.sresult .ph{width:48px;height:48px;border-radius:10px;flex:0 0 auto;object-fit:cover}
  .sresult .ph{background:color-mix(in srgb,var(--accent2) 14%, var(--paper))}
  .sresult .st{min-width:0}
  .sresult .st b{display:block;font-size:14.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sresult .st span{display:block;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---------- Feed ---------- */
  .shell{max-width:680px;margin:0 auto}
  .feed{
    padding:6px 14px calc(40px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:20px;
  }
  .rail{display:none}
  @media (min-width:1100px){
    .shell{max-width:1080px;display:flex;gap:24px;align-items:flex-start;padding:0 16px}
    .feed{flex:1 1 0;min-width:0;padding-left:0;padding-right:0}
    .rail{display:flex;flex-direction:column;gap:16px;flex:0 0 330px;position:sticky;top:74px;max-height:calc(100vh - 88px);overflow-y:auto;padding-bottom:24px}
  }
  .rail-card{border-radius:16px;padding:16px}
  .rail-card h3{font-size:1.1rem;margin:0 0 10px}
  .rail-list{list-style:none;margin:0;padding:0}
  .rail-list li{border-bottom:1px solid color-mix(in srgb,var(--muted) 16%,transparent)}
  .rail-list li:last-child{border-bottom:0}
  .rail-link{background:none;border:0;padding:8px 0;width:100%;text-align:left;color:var(--ink);font:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rail-link:hover{color:var(--accent2)}

  .card{
    border-radius:16px;
    overflow:hidden;
    position:relative;
    animation:rise .5s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0; transform:translateY(16px) scale(.99)}to{opacity:1;transform:none}}

  .card .hero{
    position:relative;
    cursor:pointer;
    background:color-mix(in srgb,var(--accent2) 12%, var(--paper));
  }
  .card .hero img{display:block; width:100%; height:220px; object-fit:cover; object-position:top center}
  .card .hero.noimg{height:120px; display:flex; align-items:flex-end}
  .reason{
    position:absolute; top:12px; left:12px; z-index:2;
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 11px; border-radius:999px;
    font-size:11px; font-weight:900; letter-spacing:.02em;
    background:var(--glass-bg-strong);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid var(--glass-brd);
    box-shadow:inset 0 1px 0 var(--glass-hi);
  }
  .reason .ic{width:13px;height:13px}
  .reason.foryou{color:var(--accent-text)}
  .reason.explore{color:var(--accent2)}
  .reason.surprise{color:var(--gold-text)}
  .reason.trending{color:var(--accent2)}
  .reason.tfa{color:var(--accent-text)}

  .digest{padding:16px 18px}
  .digest-head{display:flex;align-items:center;gap:8px;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.03em;color:var(--accent2);margin-bottom:12px}
  .digest-head .ic{width:17px;height:17px}
  .digest-sec{margin-bottom:14px}
  .digest-sec:last-child{margin-bottom:0}
  .digest-sec h3{font-size:1.05rem;margin:0 0 4px}
  .digest-sec ul{list-style:none;margin:0;padding:0}
  .digest-sec li{font-size:14px;line-height:1.45;padding:5px 0;border-bottom:1px solid color-mix(in srgb,var(--muted) 16%,transparent)}
  .digest-sec li:last-child{border-bottom:0}
  .digest-link{background:none;border:0;padding:0;text-align:left;color:var(--ink);font:inherit;font-size:14px;line-height:1.45;cursor:pointer}
  .digest-link:hover{color:var(--accent2);text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:2px}
  @media (min-width:1100px){
    .digest{column-count:2;column-gap:26px}
    .digest .digest-head{column-span:all}
    .digest-sec{break-inside:avoid}
  }
  .langtag{
    position:absolute; top:12px; right:12px; z-index:2;
    padding:4px 9px; border-radius:8px; font-size:11px; font-weight:900;
    background:var(--glass-bg-strong); border:1px solid var(--glass-brd);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }

  .card .body{padding:16px 18px 14px}
  .card h2{font-size:1.7rem; line-height:1; cursor:pointer}
  .card h2:hover{color:var(--accent)}
  .desc{margin:4px 0 0; color:var(--muted); font-size:12.5px; font-weight:700}
  .extract{margin:10px 0 0; font-size:15px; color:var(--ink)}
  .readmore{
    margin-top:8px; display:inline-flex; align-items:center; gap:6px;
    background:none; border:0; padding:0; cursor:pointer;
    color:var(--accent2); font:inherit; font-weight:800; font-size:13px;
  }
  .readmore .ic{width:15px;height:15px}

  .actions{
    display:flex; align-items:center; gap:8px;
    padding:6px 14px 16px;
  }
  .actbtn{
    flex:0 0 auto;
    display:inline-flex; align-items:center; gap:7px;
    padding:9px 13px; border-radius:14px; cursor:pointer;
    border:1px solid var(--glass-brd); background:var(--glass-bg);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:inset 0 1px 0 var(--glass-hi);
    color:var(--ink); font:inherit; font-weight:800; font-size:13px;
    transition:transform .14s ease;
  }
  .actbtn:hover{transform:translateY(-1px)}
  .actbtn:active{transform:translateY(1px)}
  .actbtn .ic{width:18px;height:18px}
  .actbtn.icon{padding:9px;width:44px;min-width:44px;justify-content:center}
  .actbtn.icon .ic{width:20px;height:20px}
  .actbtn.star.on{background:color-mix(in srgb,var(--gold) 26%,var(--paper)); color:#7a5500; border-color:color-mix(in srgb,var(--gold) 60%,var(--border))}
  .actbtn.star.on .ic{fill:var(--gold); stroke:var(--gold)}
  .dark .actbtn.star.on{color:var(--gold)}
  .actbtn.coll.on{background:color-mix(in srgb,var(--accent2) 22%,var(--paper)); color:var(--accent2)}
  .actbtn.coll.on .ic{fill:currentColor}
  .actbtn.grow{margin-left:auto}

  /* card rhythm variants */
  .v-feature .hero img{height:380px}
  .v-feature .body{padding:18px 20px 14px}
  .v-feature h2{font-size:2.5rem; line-height:.92}
  .v-feature .extract{font-size:15.5px}
  .v-compact .body{padding:16px 18px 12px}
  .v-compact h2{font-size:1.3rem}
  .v-compact .extract{margin-top:6px}
  .is-starred::after{
    content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    box-shadow:inset 0 0 0 2px color-mix(in srgb, var(--gold) 60%, transparent);
  }
  /* delight: satisfying star + ring, celebratory score pop (no elastic/bounce easing) */
  .just-starred::after{animation:ringin .5s cubic-bezier(.25,1,.5,1)}
  @keyframes ringin{from{box-shadow:inset 0 0 0 12px color-mix(in srgb,var(--gold) 40%,transparent);opacity:.2}to{opacity:1}}
  .actbtn.star.pulse .ic{animation:starpop .44s cubic-bezier(.25,1,.5,1)}
  @keyframes starpop{0%{transform:scale(1)}45%{transform:scale(1.35)}100%{transform:scale(1)}}
  .quiz-result .score{animation:popscore .55s cubic-bezier(.25,1,.5,1)}
  @keyframes popscore{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

  .card.read .hero img{opacity:.6}
  .read-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:6px}
  .read-tag .ic{width:13px;height:13px;color:#157a3f}

  .skeleton{height:300px;border-radius:16px;position:relative;overflow:hidden}
  .skeleton::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--glass-hi),transparent);transform:translateX(-100%);animation:sweep 1.3s infinite}
  @keyframes sweep{to{transform:translateX(100%)}}

  .sentinel{height:10px}
  .feed-end{text-align:center;color:var(--muted);font-weight:800;font-size:13px;padding:20px}
  .pause-card{border-radius:16px;padding:18px;text-align:left}
  .pause-card h3{font-size:1.4rem;margin-bottom:4px}
  .pause-card p{margin:0 0 14px;color:var(--muted);font-size:14px}

  /* ---------- Overlays / drawer ---------- */
  .scrim{
    position:fixed; inset:0; z-index:60;
    background:rgba(10,12,20,.45);
    backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
    display:none;
  }
  .scrim.open{display:block}

  .drawer{
    position:fixed; top:0; right:0; bottom:0; z-index:70;
    width:min(440px,92vw);
    transform:translateX(102%);
    transition:transform .32s cubic-bezier(.2,.8,.2,1);
    border-radius:18px 0 0 18px;
    display:flex; flex-direction:column;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  }
  .drawer.open{transform:none}
  .drawer-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .drawer-head h2{font-size:1.5rem;margin-right:auto}
  .drawer-scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-right:2px}

  .panel{padding:2px 0 14px;margin-bottom:14px;border-bottom:1px solid color-mix(in srgb,var(--muted) 20%,transparent)}
  .panel:last-of-type{border-bottom:0}
  .panel h3{font-size:1.15rem;margin-bottom:8px}
  .muted{color:var(--muted);font-size:13px;font-weight:600}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    display:inline-flex;align-items:center;gap:7px;
    padding:7px 12px;border-radius:999px;cursor:pointer;
    border:1px solid var(--glass-brd);background:var(--glass-bg);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    color:var(--ink);font-weight:800;font-size:13px;user-select:none;
    transition:transform .12s ease;
  }
  .chip:hover{transform:translateY(-1px)}
  .chip.sel{background:var(--accent2);color:var(--on-accent2);border-color:transparent}
  .chip .ic{width:14px;height:14px}

  .bar{height:7px;border-radius:999px;background:color-mix(in srgb,var(--muted) 30%,transparent);overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:999px;background:var(--accent)}
  .statline{display:flex;gap:8px;margin-bottom:14px}
  .stat{flex:1 1 0;min-width:0;text-align:center;padding:9px 6px;border-radius:12px;border:1px solid var(--glass-brd);background:var(--glass-bg);font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .stat b{display:block;font-family:'Bebas Neue','Impact',sans-serif;font-weight:400;font-size:1.7rem;line-height:1;color:var(--accent-text);letter-spacing:0;margin-bottom:2px}
  .topic-row{display:flex;align-items:center;gap:10px;margin:8px 0}
  .topic-row .name{flex:0 0 38%;font-weight:800;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topic-row .bar{flex:1}

  .coll-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid color-mix(in srgb,var(--muted) 22%,transparent)}
  .coll-item:last-child{border-bottom:0}
  .coll-item .ttl{flex:1;font-weight:800;font-size:14px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .coll-item .ttl:hover{color:var(--accent)}
  .mini{width:34px;height:34px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--glass-brd);background:var(--glass-bg);color:var(--ink)}
  .mini .ic{width:16px;height:16px}

  .field{
    width:100%; font:inherit; font-weight:700; font-size:15px;
    padding:11px 13px; border-radius:13px; color:var(--ink);
    border:1px solid var(--glass-brd); background:var(--glass-bg-strong);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 16px;border-radius:14px;cursor:pointer;font:inherit;font-weight:800;
    border:1px solid var(--glass-brd);background:var(--glass-bg);color:var(--ink);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:inset 0 1px 0 var(--glass-hi);transition:transform .14s ease;min-height:46px;
  }
  .btn:hover{transform:translateY(-1px)} .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  .btn.alt{background:var(--accent2);color:var(--on-accent2);border-color:transparent}
  .btn .ic{width:18px;height:18px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  /* ---------- Full article ---------- */
  .reader{
    position:fixed; inset:0; z-index:95;
    transform:translateY(100%);
    transition:transform .38s cubic-bezier(.2,.8,.2,1);
    display:flex; flex-direction:column;
    background:var(--glass-bg-strong);
    backdrop-filter:blur(26px) saturate(170%); -webkit-backdrop-filter:blur(26px) saturate(170%);
  }
  .reader.open{transform:none}
  .reader-bar{
    display:flex;align-items:center;gap:10px;
    padding:12px max(14px,env(safe-area-inset-left));
    border-bottom:1px solid var(--glass-brd);
  }
  .reader-bar .rttl{flex:1;font-size:1.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .reader-scroll{
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:18px max(16px,env(safe-area-inset-left)) calc(60px + env(safe-area-inset-bottom));
  }
  .reader-progress{position:absolute;top:0;left:0;height:3px;width:0;background:var(--accent);z-index:3;transition:width .1s linear}
  .reader-inner{max-width:1080px;margin:0 auto}
  .reader-tools{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
  .read-time{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
  .text-size{display:inline-flex;gap:6px}
  .text-size .iconbtn{width:auto;min-width:42px;padding:6px 11px;font-weight:800;font-size:15px}
  .reader-inner h1.title{font-size:2.6rem;line-height:.95;margin-bottom:6px}

  .wiki-content{font-size:16px;line-height:1.65}
  .wiki-content::after{content:"";display:block;clear:both}
  .wiki-content p{margin:0 0 14px}
  .wiki-content h2,.wiki-content h3,.wiki-content h4{font-family:'Bebas Neue','Impact',sans-serif;text-transform:uppercase;margin:22px 0 8px;border-bottom:2px solid color-mix(in srgb,var(--muted) 30%,transparent);padding-bottom:4px}
  .wiki-content h2{font-size:1.6rem} .wiki-content h3{font-size:1.3rem}
  .wiki-content a{color:var(--accent2);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--accent2) 40%,transparent)}
  .wiki-content a:hover{color:var(--accent)}
  .wiki-content img{max-width:100%;height:auto;border-radius:12px}
  .wiki-content figure{margin:14px 0}
  .wiki-content figcaption{font-size:12.5px;color:var(--muted);margin-top:4px}
  .wiki-content ul,.wiki-content ol{padding-left:22px;margin:0 0 14px}
  .wiki-content li{margin:4px 0}
  .wiki-content table{max-width:100%;display:block;overflow-x:auto;border-collapse:collapse;font-size:13px;margin:14px 0}
  .wiki-content table td,.wiki-content table th{border:1px solid color-mix(in srgb,var(--muted) 30%,transparent);padding:6px 8px}
  .wiki-content sup{font-size:.7em}
  .wiki-content .thumb{margin:14px 0}
  .wiki-content .infobox{float:right;width:340px;max-width:42%;margin:0 0 16px 22px;font-size:13px;border:1px solid color-mix(in srgb,var(--muted) 30%,transparent);border-radius:10px;overflow:hidden}
  .wiki-content .tright,.wiki-content .thumbright,.wiki-content figure.mw-halign-right{float:right;clear:right;margin:4px 0 12px 18px;max-width:46%}
  .wiki-content .tleft,.wiki-content .thumbleft,.wiki-content figure.mw-halign-left{float:left;clear:left;margin:4px 18px 12px 0;max-width:46%}
  @media (max-width:640px){
    .wiki-content .infobox,.wiki-content .tright,.wiki-content .tleft,.wiki-content .thumbright,.wiki-content .thumbleft,.wiki-content figure.mw-halign-right,.wiki-content figure.mw-halign-left{float:none;width:100%;max-width:100%;margin:14px 0}
  }
  .wiki-content .mw-editsection,.wiki-content .navbox,.wiki-content .vertical-navbox,.wiki-content .metadata,.wiki-content .noprint,.wiki-content #toc,.wiki-content .toc,.wiki-content .hatnote,.wiki-content .mw-empty-elt,.wiki-content .reference-text .cite-bracket{display:none}

  /* ---------- Quiz ---------- */
  .quiz{
    position:fixed; inset:0; z-index:85;
    transform:translateY(100%);
    transition:transform .38s cubic-bezier(.2,.8,.2,1);
    display:flex; flex-direction:column;
    background:var(--glass-bg-strong);
    backdrop-filter:blur(26px) saturate(170%); -webkit-backdrop-filter:blur(26px) saturate(170%);
  }
  .quiz.open{transform:none}
  .quiz-progress{font-weight:800;color:var(--muted);font-size:13px}
  .quiz-inner{max-width:680px;margin:0 auto}
  .quiz-kicker{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--accent2);margin-bottom:10px}
  .quiz-desc{font-size:19px;line-height:1.55;margin:0 0 20px}
  .quiz-opt{
    display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    margin:9px 0;padding:14px 16px;border-radius:14px;cursor:pointer;
    border:1px solid var(--glass-brd);background:var(--glass-bg);color:var(--ink);
    font:inherit;font-weight:700;font-size:15px;transition:transform .12s ease;
  }
  .quiz-opt:hover:not(:disabled){transform:translateY(-1px)}
  .quiz-opt:disabled{cursor:default}
  .quiz-letter{flex:0 0 auto;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;background:var(--glass-bg);border:1px solid var(--glass-brd);font-family:'Bebas Neue','Impact',sans-serif;font-size:1.05rem;color:var(--accent2)}
  .qopt-label{flex:1}
  .quiz-opt .mark{width:20px;height:20px;flex:0 0 auto;opacity:0;margin-left:auto}
  .quiz-opt.correct .mark{opacity:1;color:#157a3f}
  .quiz-opt.wrong .mark{opacity:1;color:#b3261e}
  .quiz-opt.correct .quiz-letter{background:#157a3f;color:#fff;border-color:#157a3f}
  .quiz-opt.wrong .quiz-letter{background:#b3261e;color:#fff;border-color:#b3261e}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .quiz-opt.correct{background:color-mix(in srgb,#157a3f 20%,var(--paper));border-color:#157a3f;color:var(--ink)}
  .quiz-opt.correct .mark{opacity:1;color:#157a3f}
  .quiz-opt.wrong{background:color-mix(in srgb,var(--danger) 18%,var(--paper));border-color:var(--danger)}
  .quiz-actions{display:flex;justify-content:flex-end;margin-top:18px}
  .quiz-result{text-align:center;padding:32px 0}
  .quiz-result .score{font-family:'Bebas Neue','Impact',sans-serif;font-size:4.5rem;line-height:1;color:var(--accent-text)}
  .quiz-result p{color:var(--muted);margin:6px 0 20px}

  /* ---------- Lese-Rückblick (scrollytelling) ---------- */
  .recap{
    position:fixed; inset:0; z-index:90;
    transform:translateY(100%);
    transition:transform .4s cubic-bezier(.2,.8,.2,1);
    background:var(--bg);
  }
  .recap.open{transform:none}
  .recap-close{position:fixed; top:max(14px,env(safe-area-inset-top)); right:14px; z-index:4}
  .recap-progress{position:fixed; left:0; top:0; height:3px; width:0; background:var(--accent); z-index:4}
  .recap-scroll{height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch}
  .recap-scene{
    min-height:100svh; box-sizing:border-box;
    display:flex; flex-direction:column; justify-content:center;
    max-width:680px; margin:0 auto; padding:48px 24px;
  }
  .recap-scene .kicker{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--accent2);margin-bottom:16px;opacity:0;transform:translateY(12px);transition:opacity .6s ease, transform .6s ease}
  .recap-scene .headline{font-family:'Bebas Neue','Impact',sans-serif;font-weight:400;font-size:clamp(2.4rem,8vw,4.2rem);line-height:.95;margin:0 0 14px;opacity:0;transform:translateY(18px);transition:opacity .6s ease .05s, transform .6s ease .05s}
  .recap-scene .sub{font-size:17px;line-height:1.5;color:var(--muted);max-width:46ch;opacity:0;transform:translateY(18px);transition:opacity .6s ease .12s, transform .6s ease .12s}
  .recap-scene.in .kicker,.recap-scene.in .headline,.recap-scene.in .sub{opacity:1;transform:none}
  .recap-num{color:var(--accent-text)}
  .recap-bars{margin-top:26px;display:flex;flex-direction:column;gap:14px}
  .recap-bar .lbl{display:flex;justify-content:space-between;gap:10px;font-weight:800;font-size:14px;margin-bottom:6px}
  .recap-bar .lbl span:last-child{color:var(--muted)}
  .recap-bar .track{height:14px;border-radius:999px;background:color-mix(in srgb,var(--muted) 22%,transparent);overflow:hidden}
  .recap-bar .track i{display:block;height:100%;width:0;border-radius:999px;background:var(--accent)}
  .recap-scene.in .recap-bar .track i{width:var(--w);transition:width 1s cubic-bezier(.25,1,.5,1) .15s}
  .recap-chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:22px}
  .recap-chip{padding:9px 14px;border-radius:14px;border:1px solid var(--glass-brd);background:var(--glass-bg);font-weight:700;font-size:14px;opacity:0;transform:translateY(10px);transition:opacity .5s ease, transform .5s ease}
  .recap-scene.in .recap-chip{opacity:1;transform:none}
  .recap-cta{margin-top:28px;display:flex;gap:10px;flex-wrap:wrap;opacity:0;transition:opacity .6s ease .2s}
  .recap-scene.in .recap-cta{opacity:1}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translate(-50%,16px);
    z-index:120;padding:11px 18px;border-radius:14px;font-weight:800;font-size:14px;
    background:var(--glass-bg-strong);border:1px solid var(--glass-brd);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 10px 30px var(--glass-shadow);
    opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  }
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .toast{display:flex;align-items:center;gap:14px}
  .toast-action{background:var(--accent2);color:var(--on-accent2);border:0;border-radius:9px;padding:6px 12px;font:inherit;font-weight:800;cursor:pointer;flex:0 0 auto;pointer-events:auto}

  #ptr{position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:38;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;background:var(--glass-bg-strong);border:1px solid var(--glass-brd);backdrop-filter:blur(12px) saturate(150%);-webkit-backdrop-filter:blur(12px) saturate(150%);box-shadow:0 6px 20px var(--glass-shadow)}
  #ptr .ic{width:20px;height:20px;color:var(--accent);transition:transform .2s ease}
  #ptr.ready .ic{transform:rotate(180deg)}

  /* ---------- Onboarding ---------- */
  .onb{
    position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:18px;
    background:rgba(10,12,20,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  }
  .onb.open{display:flex}
  .onb .sheet{width:min(560px,100%);max-height:88vh;overflow-y:auto;border-radius:24px;padding:24px}
  .onb h2{font-size:2rem;line-height:1}
  .onb .lead{color:var(--muted);font-weight:600;margin:6px 0 16px;font-size:14px}

  @media (max-width:520px){
    .brand .sub{display:none}
    .card .hero img{height:190px}
    .v-feature .hero img{height:240px}
    .v-feature h2{font-size:1.9rem}
    .actbtn span.lbl{display:none}
    .topbar{gap:7px; padding:8px 10px}
    .brand .logo{font-size:1.5rem}
    .iconbtn{width:40px;height:40px}
    .seg button{padding:8px 10px}
    .searchbar{top:56px}
    .actbtn.icon{width:auto; flex:1 1 0}
  }
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
  .focusable:focus-visible{outline:3px solid var(--focus);outline-offset:3px}
</style>
</head>
<body>

<header class="topbar glass">
  <div class="brand">
    <span class="logo bebas">Wiki<span class="ac">doomia</span></span>
    <span class="sub" data-i18n="brandSub">dein Wissens‑Feed</span>
  </div>
  <button class="iconbtn focusable" id="btnQuiz" data-i18n-title="startQuiz" data-i18n-aria="startQuiz" title="Quiz starten" aria-label="Quiz starten" hidden>
    <svg class="ic"><use href="#i-quiz"/></svg>
    <span class="badge-count">!</span>
  </button>
  <button class="iconbtn focusable" id="btnSearch" data-i18n-title="search" data-i18n-aria="search" title="Suchen" aria-label="Suchen">
    <svg class="ic"><use href="#i-search"/></svg>
  </button>
  <button class="iconbtn focusable" id="btnColl" data-i18n-title="collProfile" data-i18n-aria="collProfile" title="Sammlungen & Profil" aria-label="Sammlungen & Profil">

  <button class="iconbtn focusable" id="searchClose" data-i18n-title="close" data-i18n-aria="close" title="Schließen" aria-label="Schließen"><svg class="ic"><use href="#i-x"/></svg></button>

    </div>

          <button class="iconbtn focusable" id="readerBigger" data-i18n-title="textBigger" data-i18n-aria="textBigger" title="Schrift größer" aria-label="Schrift größer">A+</button>

<!-- Lese-Rückblick (scrollytelling) -->

</div>

const $ = s => document.querySelector(s);
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- accessibility: focus trap for overlays (stack-aware, restores focus) ---------- */
const FOCUS_SEL='a[href],button:not([disabled]),input:not([disabled]),select,textarea,[tabindex]:not([tabindex="-1"])';
const focusStack=[];
function trapFocus(container){
  const prev=document.activeElement;
  const handler=(e)=>{
    if(e.key!=="Tab") return;
    const topx=focusStack[focusStack.length-1];
    if(!topx || topx.container!==container) return;
    const items=[...container.querySelectorAll(FOCUS_SEL)].filter(el=>el.offsetParent!==null);
    if(!items.length) return;
    const first=items[0], last=items[items.length-1];
    if(e.shiftKey && (document.activeElement===first || !container.contains(document.activeElement))){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && (document.activeElement===last || !container.contains(document.activeElement))){ e.preventDefault(); first.focus(); }
  };
  document.addEventListener("keydown",handler,true);
  focusStack.push({container,handler,prev});
  const items=[...container.querySelectorAll(FOCUS_SEL)].filter(el=>el.offsetParent!==null);
  const target=items[0]||container;
  if(target&&target.focus) try{ target.focus(); }catch(e){}
}
function releaseFocus(){
  const top=focusStack.pop(); if(!top) return;
  document.removeEventListener("keydown",top.handler,true);
  try{ top.prev&&top.prev.focus&&top.prev.focus(); }catch(e){}
}

/* ---------- feed performance: cap DOM growth on endless scroll ---------- */
function trimFeed(){
  if(reader.classList.contains("open")||$("#quiz").classList.contains("open")||$("#recap").classList.contains("open")) return;
  const MAX=100;
  const cards=feedEl.querySelectorAll(".card");
  const target=cards.length-MAX;
  if(target<=0) return;
  let freed=0;
  for(let i=0;i<target;i++){
    const c=cards[i];
    if(c.getBoundingClientRect().bottom>0) break;   // never remove visible cards
    freed+=c.offsetHeight+20;                        // card height + flex gap
    c.remove();
  }
  if(freed>0) window.scrollBy(0,-freed);             // compensate so nothing jumps
}

        <button class="btn primary focusable" data-ok>${esc(confirm)}</button>
      </div></div>`;
    document.body.appendChild(w); trapFocus(w);
    const input=w.querySelector("[data-in]");
    const done=v=>{ w.remove(); releaseFocus(); resolve(v); };
    setTimeout(()=>input.focus(),30);
    w.querySelector("[data-x]").onclick=()=>done(null);
    w.querySelector("[data-cancel]").onclick=()=>done(null);
    w.querySelector("[data-ok]").onclick=()=>done(input.value.trim()||null);
    w.addEventListener("click",e=>{ if(e.target===w) done(null); });
    input.addEventListener("keydown",e=>{ if(e.key==="Enter") done(input.value.trim()||null); if(e.key==="Escape") done(null); });
  });

function weightedPick(obj){
  const keys=Object.keys(obj); if(!keys.length) return null;
  let total=0; for(const k of keys) total+=obj[k];
  let r=Math.random()*total;
  for(const k of keys){ r-=obj[k]; if(r<=0) return k; }
  return keys[keys.length-1];
}

/* lightweight, dependency-free confetti for earned moments; respects reduced-motion */
function burstConfetti(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const c=document.createElement("canvas");
  c.style.cssText="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:130";
  c.width=innerWidth; c.height=innerHeight;
  document.body.appendChild(c);
  const ctx=c.getContext("2d");
  const cols=["#ff6b35","#1557ff","#f4a700","#1f9d55"], parts=[];
  for(let i=0;i<90;i++) parts.push({
    x:c.width/2+(Math.random()-.5)*140, y:c.height*0.34,
    vx:(Math.random()-.5)*9, vy:Math.random()*-9-3, g:.22+Math.random()*.1,
    s:5+Math.random()*6, rot:Math.random()*6.28, vr:(Math.random()-.5)*.3, col:cols[i%4]});
  const start=performance.now();
  (function frame(now){
    ctx.clearRect(0,0,c.width,c.height);
    parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      const a=Math.max(0,1-(now-start)/2300);
      ctx.save(); ctx.globalAlpha=a; ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.col; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore(); });
    if(now-start<2400) requestAnimationFrame(frame); else c.remove();
  })(start);
}

/* ---------- API ----------
   Uses JSONP (script-tag) instead of fetch(). This avoids CORS entirely and
   works even when the page is opened as a local file:// document (where Safari
   and embedded previews block cross-origin fetch). MediaWiki supports JSONP via
   the &callback= parameter. */
let jsonpSeq=0;
function apiGet(params){
  return new Promise((resolve,reject)=>{
    const cb="wfcb_"+(++jsonpSeq)+"_"+Math.floor(Math.random()*1e6);
    const u=new URL(api());
    const p={format:"json",...params,callback:cb};
    Object.entries(p).forEach(([k,v])=>u.searchParams.set(k,v));
    const s=document.createElement("script");
    let finished=false;
    const cleanup=()=>{ try{delete window[cb];}catch(e){window[cb]=undefined;} s.remove(); clearTimeout(timer); };
    const timer=setTimeout(()=>{ if(!finished){ finished=true; cleanup(); reject(new Error("Zeitüberschreitung")); } },15000);
    window[cb]=(data)=>{ if(finished) return; finished=true; cleanup(); resolve(data); };
    s.onerror=()=>{ if(!finished){ finished=true; cleanup(); reject(new Error("Netzwerk-/Ladefehler")); } };
    s.src=u.toString();
    document.head.appendChild(s);
  });
}
function normalizePages(json){
  const pages=json?.query?.pages; if(!pages) return [];
  return Object.values(pages)
    .filter(p=>p && !p.missing && p.extract)
    .map(p=>({
      title:p.title,
      extract:(p.extract||"").trim(),
      thumb:p.thumbnail?.source||null,
      url:p.fullurl||p.canonicalurl||`https://${state.lang}.wikipedia.org/wiki/${encodeURIComponent(p.title)}`,
      lang:state.lang
    }))
    .filter(a=>a.extract.length>60);
}
const COMMON = {

async function fetchTrending(n=20){
  let items=[];
  try{
    const j=await apiGet({action:"query", list:"mostviewed", pvimmetric:"pageviews", pvimlimit:50});
    items=(j?.query?.mostviewed||[]).filter(p=>p && p.ns===0 && p.title && !/[:/]/.test(p.title));
  }catch(e){ return []; }
  const titles=items.slice(0,n).map(p=>p.title);
  if(!titles.length) return [];
  const d=await apiGet({...COMMON, titles:titles.join("|")});
  const arr=normalizePages(d);
  const order=new Map(titles.map((tt,i)=>[tt,i]));   // keep most-viewed ranking
  arr.sort((a,b)=>(order.get(a.title)??999)-(order.get(b.title)??999));
  return arr;

async function nextTrending(){

  return null;
}
/* REST feed/featured — Wikipedia start-page content. CORS (no JSONP); works on http(s)
   and from file:// in Chromium/Firefox. Fails gracefully (returns null) if blocked. */
async function fetchFeatured(){
  const lang=state.lang;
  if(state.featuredCache && state.featuredCache.lang===lang) return state.featuredCache;
  const n=new Date(), y=n.getFullYear(), m=String(n.getMonth()+1).padStart(2,"0"), dd=String(n.getDate()).padStart(2,"0");
  let data;
  try{
    const r=await fetch(`https://${lang}.wikipedia.org/api/rest_v1/feed/featured/${y}/${m}/${dd}`,{headers:{Accept:"application/json"}});
    if(!r.ok) throw 0; data=await r.json();
  }catch(e){ return null; }
  const tmp=document.createElement("div");
  const txt=h=>{ tmp.innerHTML=h||""; return (tmp.textContent||"").trim(); };
  const linkFromHtml=h=>{ tmp.innerHTML=h||""; const a=tmp.querySelector('a[href]'); if(!a) return null; let x=a.getAttribute("href")||""; x=x.replace(/^\.\//,"").replace(/^.*\/wiki\//,""); x=decodeURIComponent(x.split("#")[0]); return x?x.replace(/_/g," "):null; };
  const pageTitle=p=>p && (p.normalizedtitle || (p.titles&&p.titles.normalized) || (p.title||"").replace(/_/g," ")) || null;
  const tfa=data.tfa ? {
    title: data.tfa.normalizedtitle || (data.tfa.title||"").replace(/_/g," "),
    extract:(data.tfa.extract||"").trim(),
    thumb:(data.tfa.thumbnail&&data.tfa.thumbnail.source)||null,
    url:(data.tfa.content_urls&&data.tfa.content_urls.desktop&&data.tfa.content_urls.desktop.page)||`https://${lang}.wikipedia.org/wiki/${encodeURIComponent(data.tfa.title||"")}`,
    lang
  } : null;
  const news=(data.news||[]).slice(0,3).map(it=>({ text:txt(it.story), title:(it.links&&it.links[0]&&pageTitle(it.links[0]))||linkFromHtml(it.story) }));
  const onthisday=(data.onthisday||[]).slice(0,3).map(it=>({ text:`${it.year} — ${it.text}`, title:(it.pages&&it.pages[0]&&pageTitle(it.pages[0]))||null }));
  const dyk=(data.dyk||[]).slice(0,3).map(it=>({ text:txt(it.html||it.text), title:linkFromHtml(it.html) }));
  state.featuredCache={lang, tfa, news, onthisday, dyk};
  return state.featuredCache;
}

/* ---------- personalization ---------- */
function bumpSeed(title,amount){
  state.profile.seeds[title]=(state.profile.seeds[title]||0)+amount;
  // keep map bounded
  const keys=Object.keys(state.profile.seeds);
  if(keys.length>60){
    const cut=topEntries(state.profile.seeds,50);
    state.profile.seeds=Object.fromEntries(cut);
  }
  saveProfile();
}

  const keys=Object.keys(state.profile.cats);

  saveProfile();

}

function pickStrategy(){
  const r=Math.random();

  const profileOn=Object.keys(strongSeeds).length>0;
  // exploit grows after hits, shrinks after misses (adaptive ε-greedy)
  if(profileOn && r<state.exploit){ return {type:"morelike", seed:weightedPick(strongSeeds)}; }

    const prevSeed=state.profile.seeds[meta.title];
    const prevExploit=state.exploit;
    signalDislike(meta,seed);
    card.style.transition="opacity .25s, transform .25s";
    card.style.opacity="0"; card.style.transform="scale(.96)";
    setTimeout(()=>{ card.remove(); if(feedEl.querySelectorAll(".card").length<3) loadMore(); },240);
    toastAction(t("lessLikeThis"), t("undo"), ()=>{
      delete state.disliked[meta.title]; LS.set("wf_disliked",state.disliked);
      if(prevSeed!=null) state.profile.seeds[meta.title]=prevSeed; else delete state.profile.seeds[meta.title];
      state.exploit=prevExploit; LS.set("wf_exploit",state.exploit); saveProfile();
      const fresh=articleCard(meta,reason,seed);
      feedEl.insertBefore(fresh,(sib && sib.parentNode===feedEl)?sib:null);
    });
  });

  const shareBtn=document.createElement("button");
  shareBtn.className="actbtn icon focusable";
  shareBtn.title=t("share"); shareBtn.setAttribute("aria-label",t("share"));
  shareBtn.innerHTML=svgIc("i-share");
  shareBtn.addEventListener("click",()=>shareArticle(meta));

  actions.append(starBtn,collBtn,downBtn,shareBtn);
  card.appendChild(actions);

  if(state.read.has(meta.title)){ card.classList.add("read"); addReadTag(card); }

  observeDwell(card,meta.title);
  return card;
}

async function loadMore(){
  if(state.queueBusy||state.endReached) return;
  state.queueBusy=true;
  const gen=state.feedGen;               // abort if resetFeed() runs while we await
  // skeletons
  const skels=[];
  for(let i=0;i<2;i++){ const s=document.createElement("div"); s.className="skeleton glass"; feedEl.appendChild(s); skels.push(s); }

  let attempts=0, added=0;
  try{
    // one-shot "Today on Wikipedia" cluster on a fresh feed (article of the day + digest)
    if(state.wantFeaturedFirst && state.pendingStrategies.length===0 && feedEl.querySelectorAll(".card").length===0){
      state.wantFeaturedFirst=false;
      const f=await fetchFeatured();
      if(gen!==state.feedGen){ skels.forEach(s=>s.remove()); state.queueBusy=false; return; }
      if(f){
        if(f.tfa && f.tfa.extract && !state.seen.has(f.tfa.title) && !state.disliked[f.tfa.title]){
          state.seen.add(f.tfa.title);
          feedEl.insertBefore(articleCard(f.tfa,"tfa",null), skels[0]||null);
          added++; state.sessionCards++;
        }
        if((f.news&&f.news.length)||(f.onthisday&&f.onthisday.length)||(f.dyk&&f.dyk.length)){
          feedEl.insertBefore(buildDigestCard(f), skels[0]||null);
        }
        state.wantTrendingFirst=false;   // avoid stacking another big hook right after
      }
    }
    while(added<4 && attempts<6){
      attempts++;
      const noPending = state.pendingStrategies.length===0;
      // Hook: a "most-read today" article as the very first card of a fresh feed,
      // and occasionally (every 14–22 cards) thereafter. Variable-ratio serendipity in between.
      const trendingFirst = noPending && state.wantTrendingFirst && feedEl.querySelectorAll(".card").length===0;
      const surprise = noPending && !trendingFirst && state.cardsSinceSurprise>=state.surpriseAt;
      const trendingMix = noPending && !trendingFirst && !surprise && state.cardsSinceTrending>=state.trendingAt;
      let strat;
      if(trendingFirst||trendingMix) strat={type:"trending"};
      else if(surprise) strat={type:"serendipity"};
      else strat = state.pendingStrategies.length ? state.pendingStrategies.shift() : pickStrategy();
      let batch=[];
      if(strat.type==="morelike") batch=await fetchMoreLike(strat.seed);
      else if(strat.type==="search") batch=await fetchSearch(strat.term);
      else if(strat.type==="trending"){
        const a=await nextTrending();
        if(a) batch=[a]; else { strat={type:"random"}; batch=await fetchRandom(); }
      }
      else batch=await fetchRandom();
      if(gen!==state.feedGen) return;     // a reset happened mid-fetch → drop this stale batch
      if(strat.type==="morelike" && batch.length===0){ batch=await fetchRandom(); if(gen!==state.feedGen) return; }
      // morelike → "Für dich"; serendipity → "Zufallsfund"; trending → "Viel gelesen"; else unlabelled.
      const reason = strat.type==="morelike" ? "foryou"
                   : strat.type==="serendipity" ? "serendipity"
                   : strat.type==="trending" ? "trending" : "none";
      const seed = strat.type==="morelike" ? strat.seed : null;
      for(const a of batch){
        if(state.seen.has(a.title) || state.disliked[a.title]) continue;
        state.seen.add(a.title);
        const ref = (skels[0] && skels[0].parentNode===feedEl) ? skels[0] : null;
        feedEl.insertBefore(articleCard(a,reason,seed), ref);
        added++; state.sessionCards++;
        if(strat.type==="serendipity"){ state.cardsSinceSurprise=0; state.surpriseAt=randInt(4,8); break; }
        if(strat.type==="trending"){ state.wantTrendingFirst=false; state.cardsSinceTrending=0; state.trendingAt=randInt(14,22); break; }
        state.cardsSinceSurprise++; state.cardsSinceTrending++;
      }
    }
  }catch(e){
    if(gen===state.feedGen) toast(t("errPrefix",(e&&e.message)?e.message:"?"));
  }finally{
    skels.forEach(s=>s.remove());
    if(gen===state.feedGen) state.queueBusy=false;   // don't clobber a newer load
  }
  if(gen===state.feedGen && added===0 && feedEl.querySelectorAll(".card").length===0){
    const box=document.createElement("div");
    box.className="feed-end";
    box.innerHTML=`${esc(t("couldNotLoad"))} <button class="btn" style="margin-top:10px">${esc(t("retry"))}</button>`;
    box.querySelector("button").addEventListener("click",()=>{ box.remove(); loadMore(); });
    feedEl.appendChild(box);
  }
  if(gen===state.feedGen) trimFeed();
  maybeShowPause();
}

/* gentle "you've read a lot today" nudge — healthy-by-design, dismissible */
function maybeShowPause(){
  if(state.endReached || state.sessionCards < state.nextPauseAt) return;
  if(feedEl.querySelector(".pause-card")) return;
  state.nextPauseAt = state.sessionCards + 40;   // re-arm, no nagging
  const box=document.createElement("div");
  box.className="pause-card glass";
  box.innerHTML=`<h3 class="bebas">${esc(t("pauseTitle"))}</h3>
    <p>${esc(t("pauseMsg",state.sessionCards))}</p>
    <div class="row">
      <button class="btn focusable" data-more>${esc(t("keepReading"))}</button>
      <button class="btn primary focusable" data-stop>${esc(t("enoughToday"))}</button>
    </div>`;
  box.querySelector("[data-more]").addEventListener("click",()=>box.remove());
  box.querySelector("[data-stop]").addEventListener("click",()=>{
    state.endReached=true;
    box.replaceWith(Object.assign(document.createElement("div"),
      {className:"feed-end",textContent:t("seeYouLater")}));
    window.scrollTo({top:0,behavior:"smooth"});
  });
  feedEl.appendChild(box);
}

function resetFeed(){
  state.feedGen=(state.feedGen||0)+1;    // invalidate any in-flight loadMore
  state.seen=new Set(); state.endReached=false; state.queueBusy=false;
  state.cardsSinceSurprise=0; state.surpriseAt=randInt(4,8);
  state.cardsSinceTrending=0; state.trendingAt=randInt(14,22);
  state.trendingCache=[]; state.wantTrendingFirst=true;   // fresh hook each reset (language switch refetches)
  state.featuredCache=null; state.wantFeaturedFirst=true; // "today on Wikipedia" cluster on fresh feed
  state._railFetching=false;
  feedEl.innerHTML="";
  loadMore().then(()=>loadMore()).then(renderRail);
}

/* ---------- dwell tracking ---------- */
const dwellTimers=new Map();
const dwellObserver=new IntersectionObserver((entries)=>{
  entries.forEach(en=>{
    const title=en.target.dataset.title;
    if(en.isIntersecting && en.intersectionRatio>0.6){
      if(!dwellTimers.has(title)) dwellTimers.set(title,Date.now());
    }else{
      const start=dwellTimers.get(title);
      if(start){ signalDwell(title,(Date.now()-start)/1000); dwellTimers.delete(title); }
    }
  });
},{threshold:[0,0.6,1]});
function observeDwell(card,title){ dwellObserver.observe(card); }
window.addEventListener("visibilitychange",()=>{
  if(document.hidden){ dwellTimers.forEach((start,title)=>signalDwell(title,(Date.now()-start)/1000)); dwellTimers.clear(); }
});

function setReaderScale(delta){

$("#readerScroll").addEventListener("scroll",function(){

},{passive:true});
function closeReader(){

function fixMedia(container){
  // Wikipedia parse output uses protocol-relative (//upload…) and root-relative (/w/…)
  // URLs that break from a file:// page. Normalise src/poster/srcset on all media.
  const host=`https://${state.lang}.wikipedia.org`;
  const fixUrl=v=>{ if(!v) return v; if(v.startsWith("//")) return "https:"+v; if(v.startsWith("/")) return host+v; return v; };
  container.querySelectorAll("img,source,audio,video").forEach(el=>{
    const ds=el.getAttribute("data-src");
    if(ds && !el.getAttribute("src")) el.setAttribute("src",ds);
    const src=el.getAttribute("src"); if(src) el.setAttribute("src",fixUrl(src));
    const poster=el.getAttribute("poster"); if(poster) el.setAttribute("poster",fixUrl(poster));
    const ss=el.getAttribute("srcset")||el.getAttribute("data-srcset");
    if(ss) el.setAttribute("srcset", ss.split(",").map(part=>{ const seg=part.trim().split(/\s+/); seg[0]=fixUrl(seg[0]); return seg.join(" "); }).join(", "));
    if(el.tagName==="IMG") el.removeAttribute("loading");
  });
}
function rewriteWikiLinks(container){
  container.querySelectorAll("a[href]").forEach(a=>{
    const href=a.getAttribute("href");
    if(href.startsWith("/wiki/") && !href.includes(":")){
      const title=decodeURIComponent(href.slice(6)).replace(/_/g," ").split("#")[0];
      a.addEventListener("click",ev=>{
        ev.preventDefault();
        openReader({title, extract:"", thumb:null,
          url:`https://${state.lang}.wikipedia.org/wiki/${encodeURIComponent(title)}`, lang:state.lang});
      });
    }else if(href.startsWith("/")){
      a.setAttribute("href",`https://${state.lang}.wikipedia.org${href}`); a.target="_blank"; a.rel="noopener";
    }else if(href.startsWith("#")){
      a.addEventListener("click",ev=>{
        ev.preventDefault();
        const el=document.getElementById(decodeURIComponent(href.slice(1)));
        if(el) el.scrollIntoView({behavior:"smooth"});
      });
    }else{ a.target="_blank"; a.rel="noopener"; }
  });
}

/* ---------- quiz: "which article is described?" from recently read articles ---------- */
function noteRead(meta){
  if(meta.extract && meta.extract.length>80){
    state.readPool=[{title:meta.title,extract:meta.extract,url:meta.url,lang:meta.lang},
      ...state.readPool.filter(a=>a.title!==meta.title)].slice(0,24);
    LS.set("wf_readpool",state.readPool);
  }
  state.openedSinceQuiz++;
  if(state.openedSinceQuiz>=10 && buildQuiz().length>=3) offerQuiz();   // only offer when a real quiz is possible
}
function offerQuiz(){
  state.openedSinceQuiz=0;
  $("#btnQuiz").hidden=false;
  toast(t("quizReady"));
}
function maskTitle(text,title){
  // Mask the full title AND each significant word (with an inflection suffix \w*),
  // so partial names / declensions ("Einstein", "Klaviers") can't leak the answer.
  const terms=[title, ...title.split(/[\s,()·:–-]+/)].filter(w=>w.length>3);
  terms.sort((a,b)=>b.length-a.length);
  let t=text;
  for(const term of terms){
    const safe=term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    t=t.replace(new RegExp(safe+"\\w*","gi"),"…");
  }
  t=t.replace(/(?:…[\s,;]*){2,}/g,"… ");                 // collapse runs of masks
  t=t.replace(/\s*\([^)]*\)/g," ").replace(/\s{2,}/g," ").trim();
  return t.length>240 ? t.slice(0,240).trim()+"…" : t;
}
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(p=>p[1]); }
function buildQuiz(){
  const pool=state.readPool.filter(a=>a.extract&&a.extract.length>80);
  const poolTitles=pool.map(a=>a.title);
  const seenTitles=Array.from(state.seen);
  const picks=shuffle([...pool]).slice(0,5);
  const qs=[];
  for(const a of picks){
    // Prefer distractors from other read articles (topically closer = more plausible),
    // then fall back to the wider set of seen titles.
    const near=shuffle(poolTitles.filter(t=>t!==a.title));
    const far=shuffle(seenTitles.filter(t=>t!==a.title && !near.includes(t)));
    const distract=[...near,...far].slice(0,3);
    if(distract.length<3) continue;
    const options=shuffle([a.title,...distract]);
    qs.push({
      desc:maskTitle(a.extract,a.title),
      options,
      correctIdx:options.indexOf(a.title),
      meta:{title:a.title,url:a.url,lang:a.lang,extract:a.extract}
    });
  }
  return qs;
}
let quizState=null;
function startQuiz(){
  const qs=buildQuiz();
  if(qs.length<3){ toast(t("quizTooFew")); return; }
  quizState={qs,idx:0,score:0};
  const q=$("#quiz"); q.classList.add("open"); q.setAttribute("aria-hidden","false");
  $("#btnQuiz").hidden=true;
  document.body.style.overflow="hidden";
  renderQuizQ();
  trapFocus(q);
}
function closeQuiz(){
  const q=$("#quiz"); if(!q.classList.contains("open")) return;
  q.classList.remove("open"); q.setAttribute("aria-hidden","true");
  document.body.style.overflow=""; quizState=null; releaseFocus();
}
function renderQuizQ(){
  const {qs,idx}=quizState;
  $("#quizProgress").textContent=`${idx+1} / ${qs.length}`;
  const q=qs[idx];
  $("#quizBody").innerHTML=`<div class="quiz-kicker">${esc(t("quizKicker"))}</div>
    <p class="quiz-desc">${esc(q.desc)}</p>
    <div id="quizOpts" role="group" aria-label="${esc(t("quizKicker"))}"></div>
    <div class="quiz-actions" id="quizNextWrap"></div>`;
  const opts=$("#quizOpts");
  q.options.forEach((opt,i)=>{
    const b=document.createElement("button"); b.className="quiz-opt focusable"; b.dataset.i=i;
    b.innerHTML=`<span class="quiz-letter">${"ABCD"[i]}</span><span class="qopt-label">${esc(opt)}</span><svg class="ic mark" aria-hidden="true"><use href="#i-check"/></svg><span class="sr-only" data-sr></span>`;
    b.addEventListener("click",()=>answerQuiz(i));
    opts.appendChild(b);
  });
  const live=$("#quizLive"); if(live) live.textContent="";
  $("#quiz .reader-scroll").scrollTop=0;
  const first=opts.querySelector("button"); if(first) first.focus();
}
function answerQuiz(i){
  const opts=$("#quizOpts"); if(opts.dataset.done) return; opts.dataset.done="1";
  const q=quizState.qs[quizState.idx];
  [...opts.children].forEach((b,j)=>{
    b.disabled=true;
    const sr=b.querySelector("[data-sr]");
    if(j===q.correctIdx){
      b.classList.add("correct");
      b.querySelector(".mark use").setAttribute("href","#i-check");
      if(sr) sr.textContent=" – "+t("aRight");
    }else if(j===i){
      b.classList.add("wrong");
      b.querySelector(".mark use").setAttribute("href","#i-x");
      if(sr) sr.textContent=" – "+t("aWrong");
    }
  });
  const right = i===q.correctIdx;
  if(right) quizState.score++;
  const live=$("#quizLive"); if(live) live.textContent = right ? t("aRight") : t("correctAnswerIs", q.options[q.correctIdx]);
  const wrap=$("#quizNextWrap");
  const art=document.createElement("button"); art.className="btn focusable";
  art.innerHTML=`${svgIc("i-book")} ${esc(t("openArticle"))}`;
  art.addEventListener("click",()=>openReader(q.meta));
  const next=document.createElement("button"); next.className="btn primary focusable";
  next.textContent = quizState.idx<quizState.qs.length-1 ? t("next") : t("result");
  next.addEventListener("click",()=>{
    if(quizState.idx<quizState.qs.length-1){ quizState.idx++; renderQuizQ(); }
    else renderQuizResult();
  });
  wrap.append(art,next);
  next.focus();
}
function renderQuizResult(){
  const {score,qs}=quizState;
  $("#quizProgress").textContent="";
  const msg = score===qs.length ? t("quizPerfect") : (score>=Math.ceil(qs.length*0.6) ? t("quizGood") : t("quizMeh"));
  $("#quizBody").innerHTML=`<div class="quiz-result">
    <div class="score">${score}/${qs.length}</div><p>${esc(msg)}</p>
    <button class="btn primary focusable" id="quizDone">${esc(t("backToFeed"))}</button></div>`;
  $("#quizDone").addEventListener("click",closeQuiz);
  if(score===qs.length) burstConfetti();
}
$("#btnQuiz").addEventListener("click",startQuiz);
$("#closeQuiz").addEventListener("click",closeQuiz);

/* ---------- Lese-Rückblick: scroll story built from the user's own data ---------- */
function fmtDur(sec){
  const m=Math.round((sec||0)/60);
  if(m<60) return m+" Min";
  const h=Math.floor(m/60), mm=m%60; return mm ? `${h} Std ${mm} Min` : `${h} Std`;
}
function animateCount(el){
  const target=+el.dataset.count||0;
  if(matchMedia("(prefers-reduced-motion: reduce)").matches || target<=0){ el.textContent=target.toLocaleString({de:"de-DE",en:"en-US",fr:"fr-FR"}[state.lang]||"de-DE"); return; }
  const t0=performance.now(), dur=900;
  (function step(now){
    const p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e).toLocaleString({de:"de-DE",en:"en-US",fr:"fr-FR"}[state.lang]||"de-DE");
    if(p<1) requestAnimationFrame(step);
  })(t0);
}

    <div class="kicker">${esc(t("rkNext"))}</div>
    <h2 class="headline">${outHead}</h2>
    <p class="sub">${t("rSub5",!!topTopic)}</p>
    <div class="recap-cta">
      <button class="btn primary focusable" id="recapToFeed">${esc(t("backToFeed"))}</button>
      ${quizReady?`<button class="btn focusable" id="recapToQuiz">${esc(t("startQuiz"))}</button>`:""}
    </div>
  </section>`);

  const host=$("#recapScroll");
  host.innerHTML=sc.join("");
  const f=$("#recapToFeed"); if(f) f.addEventListener("click",closeRecap);
  const q=$("#recapToQuiz"); if(q) q.addEventListener("click",()=>{ closeRecap(); startQuiz(); });

  const io=new IntersectionObserver(es=>{
    es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); en.target.querySelectorAll("[data-count]").forEach(animateCount); io.unobserve(en.target); }});
  },{threshold:.35});
  host.querySelectorAll(".recap-scene").forEach(s=>io.observe(s));

  host.onscroll=function(){ const max=this.scrollHeight-this.clientHeight; $("#recapProgress").style.width=(max>0?this.scrollTop/max*100:0)+"%"; };
}
function openRecap(){
  if((state.stats.total||0)<3){ toast(t("recapTooFew")); return; }
  closeDrawer();
  buildRecap();
  const r=$("#recap"); r.classList.add("open"); r.setAttribute("aria-hidden","false");
  $("#recapScroll").scrollTop=0; $("#recapProgress").style.width="0%";
  document.body.style.overflow="hidden";
  trapFocus(r);
}
function closeRecap(){ const r=$("#recap"); if(!r.classList.contains("open")) return; r.classList.remove("open"); r.setAttribute("aria-hidden","true"); document.body.style.overflow=""; releaseFocus(); }
$("#openRecap").addEventListener("click",openRecap);
$("#closeRecap").addEventListener("click",closeRecap);
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){
  // close the top-most overlay first (reader sits above quiz/recap)
  if(reader.classList.contains("open")) closeReader();
  else if($("#quiz").classList.contains("open")) closeQuiz();
  else if($("#recap").classList.contains("open")) closeRecap();
  else closeDrawer();
}});

/* ---------- stars ---------- */
function toggleStar(meta){
  if(state.stars[meta.title]){ delete state.stars[meta.title]; signalStar(meta,false); toast(t("starRemoved")); }
  else{ state.stars[meta.title]={title:meta.title,url:meta.url,lang:meta.lang}; signalStar(meta,true); toast(t("starred")); }
  LS.set("wf_stars",state.stars);
}

/* ---------- collections ---------- */
function inAnyCollection(title){
  return Object.values(state.collections).some(arr=>arr.some(m=>m.title===title));
}
function saveCollections(){ LS.set("wf_collections",state.collections); updateCollBadge(); renderCollections(); }
function updateCollBadge(){
  const n=Object.values(state.collections).reduce((s,a)=>s+a.length,0);
  const b=$("#collBadge"); if(n>0){ b.hidden=false; b.textContent=n; } else b.hidden=true;
}
function openCollectionPicker(meta,after){ showCollMenu(meta,after); }
let collMenuEl=null;
function showCollMenu(meta,after){
  closeCollMenu();
  const wrap=document.createElement("div");
  wrap.className="onb open"; wrap.id="collMenu";
  const names=Object.keys(state.collections);
  wrap.innerHTML=`<div class="sheet glass" style="max-width:420px">
    <div class="row" style="justify-content:space-between;margin-bottom:10px">
      <h2 class="bebas" style="font-size:1.5rem">${esc(t("inCollection"))}</h2>
      <button class="iconbtn" id="cmClose">${svgIc("i-x")}</button>
    </div>
    <p class="muted" style="margin-bottom:12px">„${esc(meta.title)}“</p>
    <div id="cmList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"></div>
    <div class="row">
      <input class="field" id="cmNew" placeholder="${esc(t("newCollPh"))}" style="flex:1;min-width:140px">
      <button class="btn alt" id="cmAdd">${svgIc("i-plus")}</button>
    </div>
  </div>`;
  document.body.appendChild(wrap); collMenuEl=wrap; trapFocus(wrap);
  const list=wrap.querySelector("#cmList");
  function row(name){
    const has=state.collections[name].some(m=>m.title===meta.title);
    const b=document.createElement("button");
    b.className="btn focusable"+(has?" alt":"");
    b.style.justifyContent="space-between";
    b.innerHTML=`<span>${esc(name)}</span>${has?svgIc("i-x"):svgIc("i-plus")}`;
    b.addEventListener("click",()=>{
      const arr=state.collections[name];
      const idx=arr.findIndex(m=>m.title===meta.title);
      if(idx>=0){
        const removed=arr[idx]; arr.splice(idx,1);
        toastAction(t("removedFrom",name), t("undo"), ()=>{
          if(!state.collections[name]) state.collections[name]=[];
          state.collections[name].push(removed); saveCollections(); if(after) after();
          list.innerHTML=""; Object.keys(state.collections).forEach(n=>list.appendChild(row(n)));
        });
      }
      else{ arr.push({title:meta.title,url:meta.url,lang:meta.lang}); toast(t("addedTo",name)); }
      saveCollections(); if(after) after();
      // refresh menu
      list.innerHTML=""; Object.keys(state.collections).forEach(n=>list.appendChild(row(n)));
    });
    return b;
  }
  names.forEach(n=>list.appendChild(row(n)));
  wrap.querySelector("#cmClose").addEventListener("click",closeCollMenu);
  wrap.addEventListener("click",e=>{ if(e.target===wrap) closeCollMenu(); });
  wrap.querySelector("#cmAdd").addEventListener("click",()=>{
    const v=wrap.querySelector("#cmNew").value.trim(); if(!v) return;
    if(!state.collections[v]) state.collections[v]=[];
    wrap.querySelector("#cmNew").value="";
    saveCollections();
    list.innerHTML=""; Object.keys(state.collections).forEach(n=>list.appendChild(row(n)));
  });
}
function closeCollMenu(){ if(collMenuEl){ collMenuEl.remove(); collMenuEl=null; releaseFocus(); } }

/* ---------- drawer (collections + profile) ---------- */
const drawer=$("#drawer"), scrim=$("#scrim");
function openDrawer(){ if(drawer.classList.contains("open")) return; renderCollections(); renderProfile(); renderInterestChips(); drawer.classList.add("open"); scrim.classList.add("open"); drawer.setAttribute("aria-hidden","false"); trapFocus(drawer); }
function closeDrawer(){ if(!drawer.classList.contains("open")) return; drawer.classList.remove("open"); scrim.classList.remove("open"); drawer.setAttribute("aria-hidden","true"); releaseFocus(); }
$("#btnColl").addEventListener("click",openDrawer);
$("#closeDrawer").addEventListener("click",closeDrawer);
scrim.addEventListener("click",closeDrawer);
$("#newColl").addEventListener("click",async ()=>{
  const name=await modalPrompt({title:t("newColl"),placeholder:t("collNamePh"),confirm:t("create")});
  if(!name) return;
  if(!state.collections[name]) state.collections[name]=[];
  saveCollections();
});
function renderCollections(){
  const host=$("#collList");
  const names=Object.keys(state.collections);
  if(names.length===0){ host.innerHTML=`<p class="muted">${esc(t("noColls"))}</p>`; updateCollBadge(); return; }
  host.innerHTML="";
  names.forEach(name=>{
    const sec=document.createElement("div"); sec.style.marginBottom="12px";
    const head=document.createElement("div"); head.className="row"; head.style.justifyContent="space-between";
    head.innerHTML=`<strong class="bebas" style="font-size:1.05rem">${name}</strong>`;
    const del=document.createElement("button"); del.className="mini focusable"; del.innerHTML=svgIc("i-trash");
    del.title=t("deleteCollTitle"); del.setAttribute("aria-label",t("deleteCollTitle"));
    del.addEventListener("click",async ()=>{ if(await modalConfirm({title:t("deleteCollTitle"),message:t("deleteCollMsg",name),confirm:t("del"),danger:true})){ delete state.collections[name]; saveCollections(); }});
    head.appendChild(del); sec.appendChild(head);
    const arr=state.collections[name];
    if(arr.length===0){ const e=document.createElement("p"); e.className="muted"; e.textContent=t("empty"); sec.appendChild(e); }
    arr.forEach(m=>{
      const it=document.createElement("div"); it.className="coll-item";
      const t=document.createElement("span"); t.className="ttl"; t.textContent=m.title;
      t.addEventListener("click",()=>{ closeDrawer(); openReader(m); });
      const rm=document.createElement("button"); rm.className="mini focusable"; rm.innerHTML=svgIc("i-x");
      rm.addEventListener("click",()=>{ const i=arr.findIndex(x=>x.title===m.title); if(i<0)return; const removed=arr[i]; arr.splice(i,1); saveCollections(); toastAction(t("removedFrom",name),t("undo"),()=>{ arr.splice(Math.min(i,arr.length),0,removed); saveCollections(); }); });
      it.append(t,rm); sec.appendChild(it);
    });
    host.appendChild(sec);
  });
  updateCollBadge();
}
function profileSummaryHTML(){
  const s=state.stats;
  const topsAll=topEntries(state.profile.cats,7).filter(([,v])=>v>0);
  if((s.total||0)===0 && topsAll.length===0){
    return `<p class="muted">${esc(t("profileEmpty"))}</p>`;
  }
  const mins=Math.floor((s.todaySeconds||0)/60);
  const statsHtml=`<div class="statline">
    <span class="stat"><b>${currentStreak()}</b>${esc(t("statStreak"))}</span>
    <span class="stat"><b>${mins}</b>${esc(t("statToday"))}</span>
    <span class="stat"><b>${s.total||0}</b>${esc(t("statArticles"))}</span>
  </div>`;
  const top=topEntries(state.profile.cats,7).filter(([,v])=>v>0);
  const starCount=Object.keys(state.stars).length;
  let body;
  if(top.length===0){
    body=`<p class="muted">${esc(t("noTopics"))}</p>`;
  }else{
    const max=top[0][1];
    body = top.map(([name,v])=>`
      <div class="topic-row">
        <span class="name" title="${esc(name)}">${esc(name)}</span>
        <span class="bar"><i style="width:${Math.max(8,Math.round(v/max*100))}%"></i></span>
      </div>`).join("") + `<p class="muted" style="margin-top:8px">${esc(t("profileSummary",starCount,Object.keys(state.profile.seeds).length))}</p>`;
  }
  return statsHtml + body;
}
function renderProfile(){
  $("#profileBody").innerHTML = profileSummaryHTML();
  renderRail();
}
/* desktop-only context panel beside the feed (hidden on mobile via CSS) */
function renderRail(){
  const rail=$("#rail"); if(!rail) return;
  const visible = getComputedStyle(rail).display!=="none";
  const tr=(state.trendingCache||[]).filter(a=>a&&a.title).slice(0,7);
  let html="";
  if(tr.length) html+=`<section class="rail-card glass"><h3 class="bebas">${esc(t("trending"))}</h3><ul class="rail-list"></ul></section>`;
  html+=`<section class="rail-card glass"><h3 class="bebas">${esc(t("topicProfile"))}</h3>${profileSummaryHTML()}</section>`;
  rail.innerHTML=html;
  const ul=rail.querySelector(".rail-list");
  if(ul) tr.forEach(a=>{ const li=document.createElement("li"); const btn=document.createElement("button"); btn.className="rail-link focusable"; btn.textContent=a.title; btn.addEventListener("click",()=>openReader(a)); li.appendChild(btn); ul.appendChild(li); });
  // populate trending for the panel on demand (desktop only)
  if(visible && !tr.length && !state._railFetching){
    state._railFetching=true;
    fetchTrending(20).then(arr=>{ state._railFetching=false; if(arr&&arr.length){ state.trendingCache=arr; renderRail(); } }).catch(()=>{ state._railFetching=false; });
  }
}

/* ---------- interests ---------- */
function renderInterestChips(){
  const host=$("#interestChips"); host.innerHTML="";
  const presets=PRESET_TOPICS[state.lang];
  const all=Array.from(new Set([...state.interests,...presets]));
  all.forEach(topic=>{

    c.textContent=topic;

}

  document.documentElement.classList.toggle("dark",state.theme==="dark");
  $("#btnTheme").querySelector("use").setAttribute("href",state.theme==="dark"?"#i-sun":"#i-moon");
}
$("#btnTheme").addEventListener("click",()=>{ state.theme=state.theme==="dark"?"light":"dark"; LS.set("wf_theme",state.theme); applyTheme(); });

});

/* ---------- search / jump to topic (feed-app style: live suggestions + recents) ---------- */
function addRecent(term){
  term=(term||"").trim(); if(!term) return;
  state.recent=[term,...(state.recent||[]).filter(t=>t.toLowerCase()!==term.toLowerCase())].slice(0,8);
  LS.set("wf_recent",state.recent);
}
function openSearch(){
  $("#searchBar").hidden=false;
  const i=$("#searchInput"); i.focus(); i.select();
  if(i.value.trim().length>=2) renderSuggest(i.value); else renderRecent();
}
function closeSearch(){ $("#searchBar").hidden=true; $("#searchResults").hidden=true; }
function doSearch(term){
  term=(term||"").trim(); if(!term) return;
  addRecent(term);
  state.pendingStrategies=[{type:"search",term},{type:"search",term}];
  closeSearch();
  resetFeed();
  window.scrollTo({top:0,behavior:"smooth"});
  toast(t("searchToast",term));
}
function renderRecent(){
  const box=$("#searchResults"); const r=state.recent||[];
  if(r.length===0){ box.hidden=true; box.innerHTML=""; return; }
  box.hidden=false;
  box.innerHTML=`<div class="search-head">${esc(t("recentSearches"))}</div><div class="search-recent"></div>`;
  const wrap=box.querySelector(".search-recent");
  r.forEach(t=>{
    const c=document.createElement("button"); c.className="chip focusable"; c.textContent=t;
    c.addEventListener("click",()=>{ $("#searchInput").value=t; renderSuggest(t); });
    wrap.appendChild(c);
  });
}
let suggestSeq=0, suggestTimer=null;
async function renderSuggest(term){
  term=(term||"").trim();
  const box=$("#searchResults");
  if(term.length<2){ renderRecent(); return; }
  const my=++suggestSeq;
  let res=[];
  try{ res=await fetchSuggest(term); }catch(e){ return; }
  if(my!==suggestSeq) return;            // a newer keystroke superseded this
  box.hidden=false;
  if(res.length===0){ box.innerHTML=`<div class="search-head">${esc(t("noResults"))}</div>`; return; }
  box.innerHTML="";
  res.forEach(meta=>{
    const row=document.createElement("div"); row.className="sresult focusable"; row.tabIndex=0;
    const thumb = meta.thumb ? `<img src="${esc(meta.thumb)}" alt="">` : `<div class="ph"></div>`;
    const sub = meta.extract ? esc(meta.extract.slice(0,90)) : "";
    row.innerHTML=`${thumb}<div class="st"><b>${esc(meta.title)}</b><span>${sub}</span></div>`;
    const go=()=>{ addRecent(term); closeSearch(); openReader(meta); };
    row.addEventListener("click",go);
    row.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } });
    box.appendChild(row);
  });
}
$("#btnSearch").addEventListener("click",()=>{
  if($("#searchBar").hidden) openSearch(); else closeSearch();
});
$("#searchGo").addEventListener("click",()=>doSearch($("#searchInput").value));
$("#searchClose").addEventListener("click",closeSearch);
$("#searchInput").addEventListener("input",e=>{
  clearTimeout(suggestTimer);
  const v=e.target.value;
  suggestTimer=setTimeout(()=>renderSuggest(v),220);
});
$("#searchInput").addEventListener("keydown",e=>{
  if(e.key==="Enter") doSearch(e.target.value);
  if(e.key==="Escape") closeSearch();
});

/* ---------- onboarding ---------- */
function renderOnbChips(){

  const presets=PRESET_TOPICS[state.lang];
  const all=Array.from(new Set([...state.interests,...presets]));

    c.textContent=topic;

      const i=state.interests.indexOf(topic);

$("#onbAdd").addEventListener("click",()=>{

  $("#onbCustom").value=""; renderOnbChips();

$("#onbCustom").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#onbAdd").click(); });
function finishOnb(){

  state.profile={seeds:{},cats:{}}; state.stars={}; state.disliked={}; state.exploit=0.5;
  Object.keys(dwellAccum).forEach(k=>delete dwellAccum[k]);
  saveProfile(); LS.set("wf_stars",state.stars); LS.set("wf_disliked",state.disliked); LS.set("wf_exploit",state.exploit);

/* ---------- infinite scroll ---------- */
const sentinel=$("#sentinel");
new IntersectionObserver((entries)=>{
  if(entries[0].isIntersecting) loadMore();
},{rootMargin:"800px 0px"}).observe(sentinel);

/* ---------- mobile QOL: auto-hiding top bar + swipe gestures ---------- */
const topbar=document.querySelector(".topbar");
let lastScrollY=window.scrollY;
window.addEventListener("scroll",()=>{
  const y=window.scrollY;
  if(y<64){ topbar.classList.remove("hidden"); lastScrollY=y; return; }
  const dy=y-lastScrollY;
  if(dy>6) topbar.classList.add("hidden");           // scrolling down → hide
  else if(dy<-6) topbar.classList.remove("hidden");  // a little up → reveal
  lastScrollY=y;
},{passive:true});

// swipe-to-close for full-screen overlays: down from the top, or a horizontal "back" swipe
function addSwipeClose(el, scrollEl, closeFn){
  let sx=0,sy=0,sTop=0,ok=false;
  el.addEventListener("touchstart",e=>{ if(e.touches.length!==1){ok=false;return;} const t=e.touches[0]; sx=t.clientX; sy=t.clientY; sTop=(scrollEl()&&scrollEl().scrollTop)||0; ok=true; },{passive:true});
  el.addEventListener("touchend",e=>{ if(!ok)return; ok=false; const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)>90 && Math.abs(dx)>Math.abs(dy)*1.5){ closeFn(); return; }
    if(sTop<=2 && dy>80 && dy>Math.abs(dx)*1.5){ closeFn(); }
  },{passive:true});
}
addSwipeClose(reader, ()=>$("#readerScroll"), closeReader);
addSwipeClose($("#quiz"), ()=>$("#quiz .reader-scroll"), closeQuiz);
addSwipeClose($("#recap"), ()=>$("#recapScroll"), closeRecap);

// global horizontal swipe on the feed surface: left → open profile drawer, right → close it
(function(){
  let sx=0,sy=0,ok=false;
  document.addEventListener("touchstart",e=>{ if(e.touches.length!==1){ok=false;return;} const t=e.touches[0]; sx=t.clientX; sy=t.clientY; ok=true; },{passive:true});
  document.addEventListener("touchend",e=>{
    if(!ok)return; ok=false;
    if(reader.classList.contains("open")||$("#quiz").classList.contains("open")||$("#recap").classList.contains("open")) return;
    if(collMenuEl || document.querySelector(".onb.open")) return;
    const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)<70 || Math.abs(dx)<Math.abs(dy)*1.5) return;   // require a clear horizontal swipe
    const open=drawer.classList.contains("open");
    if(dx<0 && !open) openDrawer();          // swipe left → profile
    else if(dx>0 && open) closeDrawer();     // swipe right → close
  },{passive:true});
})();

// pull-to-refresh at the top of the feed
function anyOverlayOpen(){
  return reader.classList.contains("open")||$("#quiz").classList.contains("open")||$("#recap").classList.contains("open")||drawer.classList.contains("open")||!!collMenuEl||!!document.querySelector(".onb.open");
}
(function(){
  const ptr=document.createElement("div"); ptr.id="ptr"; ptr.innerHTML=`<svg class="ic"><use href="#i-refresh"/></svg>`;
  document.body.appendChild(ptr);
  let pStart=-1, pReady=false;
  const reset=()=>{ ptr.style.opacity="0"; ptr.style.transform="translateX(-50%)"; ptr.classList.remove("ready"); };
  document.addEventListener("touchstart",e=>{ pReady=false; pStart=(window.scrollY<=0 && e.touches.length===1 && !anyOverlayOpen()) ? e.touches[0].clientY : -1; },{passive:true});
  document.addEventListener("touchmove",e=>{
    if(pStart<0) return;
    const dist=e.touches[0].clientY-pStart;
    if(dist<=0 || window.scrollY>0){ reset(); return; }
    if(e.cancelable) e.preventDefault();
    const d=Math.min(dist,130);
    ptr.style.opacity=String(Math.min(1,d/80));
    ptr.style.transform=`translateX(-50%) translateY(${d*0.45}px)`;
    pReady=d>=80; ptr.classList.toggle("ready",pReady);
  },{passive:false});
  document.addEventListener("touchend",()=>{
    if(pStart<0) return;
    const ready=pReady; pStart=-1; pReady=false; reset();
    if(ready){ window.scrollTo({top:0}); resetFeed(); toast(t("refreshed")); }
  },{passive:true});
})();

  try{
    console.log("%cWikidoomia","font:700 24px system-ui;color:#ff6b35");
    console.log("%c"+t("consoleMsg"),"color:#1557ff;font-weight:600;font-size:13px");

  }
}
init();

if(("serviceWorker" in navigator) && (location.protocol==="https:" || location.hostname==="localhost")){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
